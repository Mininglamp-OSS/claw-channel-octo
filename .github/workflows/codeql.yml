name: CodeQL

on:
  # Weekly deep scan only. CodeQL (cross-function SAST) is intentionally NOT run
  # per-PR or per-push: per-PR breadth is the repo's own CI + osv-scanner (SCA).
  # CodeQL is a weekly deep scan + manual dispatch; findings land in the Security
  # tab. Detection latency for new code-level vulns is up to ~7 days.
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  analyze:
    uses: Mininglamp-OSS/.github/.github/workflows/reusable-codeql.yml@v1
    with:
      language: javascript-typescript
    permissions:
      actions: read
      contents: read
      security-events: write
